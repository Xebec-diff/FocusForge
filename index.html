<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  
  <!-- 📱 Responsive -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- 🧠 SEO / UX -->
  <meta name="description" content="FocusForge - Smart study and focus app with Pomodoro timer and task tracking">
  <meta name="theme-color" content="#1a1a2e">

  <title>FocusForge</title>

  <!-- 🎨 Styles -->
  <link rel="stylesheet" href="style.css">

  <!-- 🌐 Favicon -->
  <link rel="icon" href="favicon.ico">

  <!-- 🔤 Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

</head>
<body>

  <main>
    <header>
      <div class="header-title">
        <h1>FocusForge 🕊️</h1>
        <p class="header-subtitle">Siddhartha The Great</p>
        <p class="header-subtitle">haha🕵️🕵️‍♂️</p>
      </div>
      <div class="header-controls">
        <button id="musicToggle" class="music-btn" aria-label="Toggle music player" title="Toggle ambient music">🎵</button>
        <button id="themeToggle" class="theme-btn" aria-label="Toggle theme">🌙 Dark</button>
      </div>
    </header>

    <!-- 🎵 Music Player -->
    <section class="music-player" id="musicPlayer">
      <h3>Ambient Sounds</h3>
      <div class="music-options">
        <button class="music-option" data-music="lofi" aria-label="Play lo-fi beats">🎹 Lo-Fi SID</button>
        <button class="music-option" data-music="rain" aria-label="Play rain sounds">🌧️ Rain SID</button>
        <button class="music-option" data-music="forest" aria-label="Play forest sounds">🌲 Forest SID</button>
        <button class="music-option" data-music="coffee" aria-label="Play coffee shop sounds">☕ Café SID</button>
      </div>
      <div class="music-controls">
        <span style="font-size: 0.85rem; color: var(--text-secondary);">Volume:</span>
        <div class="volume-control">
          <input type="range" id="volumeControl" min="0" max="100" value="50" aria-label="Volume control">
        </div>
      </div>
      <p class="music-status" id="musicStatus">Select a sound to play</p>
    </section>

    <!-- ⏱️ Timer Section -->
    <section class="timer" aria-label="Pomodoro Timer">
      <div class="timer-type">
        <button id="workBtn" class="timer-type-btn active" aria-pressed="true">Work (25min)</button>
        <button id="breakBtn" class="timer-type-btn" aria-pressed="false">Break (5min)</button>
      </div>
      
      <h2 id="time" aria-live="polite" role="status">25:00</h2>
      
      <div class="timer-controls">
        <button id="startBtn" class="primary-btn" aria-label="Start or pause timer">Start</button>
        <button id="resetBtn" class="secondary-btn" aria-label="Reset timer">Reset</button>
      </div>

      <!-- ⚠️ Status -->
      <p id="status" aria-live="assertive" role="status"></p>

      <!-- 📊 Statistics -->
      <section class="stats" aria-label="Session Statistics">
        <h3>Today's Stats</h3>
        <div class="stat-grid">
          <div class="stat-card">
            <p class="stat-label">Sessions</p>
            <p class="stat-value" id="sessionsCount">0</p>
          </div>
          <div class="stat-card">
            <p class="stat-label">Focus Time</p>
            <p class="stat-value" id="focusTime">0m</p>
          </div>
          <div class="stat-card">
            <p class="stat-label">Tasks Done</p>
            <p class="stat-value" id="tasksCompleted">0</p>
          </div>
        </div>
      </section>
    </section>

    <!-- 📝 Tasks Section -->
    <section class="tasks" aria-label="Task Manager">
      <h2>Tasks</h2>

      <div class="task-input">
        <input type="text" id="taskInput" placeholder="Add a task..." aria-label="Task input" />
        <button id="addTaskBtn" aria-label="Add task">+ Add</button>
      </div>

      <div class="task-filters">
        <button id="filterAll" class="filter-btn active" aria-pressed="true">All</button>
        <button id="filterActive" class="filter-btn" aria-pressed="false">Active</button>
        <button id="filterCompleted" class="filter-btn" aria-pressed="false">Completed</button>
      </div>

      <ul id="taskList"></ul>

      <button id="clearCompleted" class="clear-btn" aria-label="Clear completed tasks">Clear Completed</button>
    </section>

  </main>

  <!-- ⚡ Script -->
  <script src="script.js" defer></script>

</body>
</html>
