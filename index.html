<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  
  <!-- 📱 Responsive -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- 🧠 SEO / UX -->
  <meta name="description" content="FocusForge - Smart study and focus app with Pomodoro timer and task tracking">
  <meta name="theme-color" content="#0f172a">

  <title>FocusForge</title>

  <!-- 🎨 Styles -->
  <link rel="stylesheet" href="style.css">

  <!-- 🌐 Favicon -->
  <link rel="icon" href="favicon.ico">

</head>
<body>

  <main>
    <header>
      <h1>FocusForge 🚀</h1>
      <button id="themeToggle" class="theme-btn">🌙 Dark</button>
    </header>

    <!-- ⏱️ Timer Section -->
    <section class="timer" aria-label="Pomodoro Timer">
      <div class="timer-type">
        <button id="workBtn" class="timer-type-btn active">Work</button>
        <button id="breakBtn" class="timer-type-btn">Break</button>
      </div>
      
      <h2 id="time" aria-live="polite">25:00</h2>
      
      <div class="timer-controls">
        <button id="startBtn" class="primary-btn">Start</button>
        <button id="resetBtn" class="secondary-btn">Reset</button>
      </div>

      <!-- ⚠️ Status -->
      <p id="status"></p>

      <!-- 📊 Statistics -->
      <section class="stats" aria-label="Session Statistics">
        <h3>Today's Stats</h3>
        <div class="stat-grid">
          <div class="stat-card">
            <p class="stat-label">Sessions</p>
            <p class="stat-value" id="sessionsCount">0</p>
          </div>
          <div class="stat-card">
            <p class="stat-label">Focus Time</p>
            <p class="stat-value" id="focusTime">0m</p>
          </div>
          <div class="stat-card">
            <p class="stat-label">Tasks Done</p>
            <p class="stat-value" id="tasksCompleted">0</p>
          </div>
        </div>
      </section>
    </section>

    <!-- 📝 Tasks Section -->
    <section class="tasks" aria-label="Task Manager">
      <h2>Tasks</h2>

      <div class="task-input">
        <input type="text" id="taskInput" placeholder="Add a task..." />
        <button id="addTaskBtn">+ Add</button>
      </div>

      <div class="task-filters">
        <button id="filterAll" class="filter-btn active">All</button>
        <button id="filterActive" class="filter-btn">Active</button>
        <button id="filterCompleted" class="filter-btn">Completed</button>
      </div>

      <ul id="taskList"></ul>

      <button id="clearCompleted" class="clear-btn">Clear Completed</button>
    </section>

  </main>

  <!-- ⚡ Script -->
  <script src="script.js" defer></script>

</body>
</html>
