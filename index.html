<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  
  <!-- 📱 Responsive -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- 🧠 SEO / UX -->
  <meta name="description" content="FocusForge - Smart study and focus app with Pomodoro timer and task tracking">
  <meta name="theme-color" content="#0f172a">

  <title>FocusForge</title>

  <!-- 🎨 Styles -->
  <link rel="stylesheet" href="style.css">

  <!-- 🌐 Favicon -->
  <link rel="icon" href="favicon.ico">

</head>
<body>

  <main>
    <h1>FocusForge 🚀</h1>

    <!-- ⏱️ Timer -->
    <section class="timer" aria-label="Pomodoro Timer">
      <h2 id="time" aria-live="polite">25:00</h2>
      
      <section class="tasks" aria-label="Task Manager">
  <h2>Tasks</h2>

  <div class="task-input">
    <input type="text" id="taskInput" placeholder="Add a task..." />
    <button id="addTaskBtn">Add</button>
  </div>

  <ul id="taskList"></ul>
</section>

      <div class="buttons">
        <button id="startBtn">Start</button>
        <button id="resetBtn">Reset</button>
      </div>
    </section>

    <!-- ⚠️ Status -->
    <p id="status"></p>
    <!-- 📝 Tasks -->
<section class="tasks" aria-label="Task Manager">
  <h2>Tasks</h2>
  <div class="task-input">
    <input type="text" id="taskInput" placeholder="Add a task..." />
    <button id="addTaskBtn">Add</button>
  </div>
  <ul id="taskList"></ul>
</section>
  </main>

  <!-- ⚡ Script -->
  <script src="script.js" defer></script>

</body>
</html>
